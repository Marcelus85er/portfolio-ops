pid /tmp/nginx.pid;
events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    
    # NEW: Match our 50MB backend limit so Nginx doesn't block large videos/PDFs
    client_max_body_size 50M; 

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 8080;
        server_name localhost;
        
        # 1. Serve your Tailwind HTML UI
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. NEW: The Reverse Proxy Bridge to Kubernetes!
        location /api/ {
            # "portfolio-backend" is the exact name of your K8s Service, running on port 3000
            proxy_pass http://portfolio-backend:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        listen 8080;
        server_name localhost;
        
        # NEW: Stop Nginx from leaking the internal port on redirects
        absolute_redirect off;
        port_in_redirect off;

        # 1. Serve your Tailwind HTML UI
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
