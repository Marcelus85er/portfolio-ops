apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/marcelus85er/portfolio-ops.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
